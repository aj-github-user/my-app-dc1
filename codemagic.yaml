workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      node: latest
      xcode: latest

    scripts:
      - npm install
      - npm run build
      - npx cap sync ios

      - name: List iOS files
        script: |
          find ios -maxdepth 3 -type f
          find ios -maxdepth 3 -type d

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa