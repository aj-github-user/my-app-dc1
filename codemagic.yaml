workflows:
  ios-simulator-workflow:
    name: iOS Simulator Build for Appetize

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Build iOS simulator app
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios/simulator \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip simulator app
        script: |
          APP_PATH=$(find build/ios/simulator/Build/Products -name "*.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/ios/AppetizeSimulatorApp.zip

    artifacts:
      - build/ios/AppetizeSimulatorApp.zip